<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Breaking Changes — The Latest in Tech, AI, and Gaming</title>
    <!-- Apply saved theme before paint to prevent flash -->
    <script>
      try {
        const t = localStorage.getItem('bc-theme')
        // Migrate old Zustand JSON format
        if (t && t[0] === '{') {
          try { var p = JSON.parse(t); t = p.state?.dark === false ? 'light' : 'dark'; localStorage.setItem('bc-theme', t) } catch(e) { t = 'dark' }
        }
        if (t !== 'light') document.documentElement.classList.add('dark')
      } catch(e) {
        document.documentElement.classList.add('dark')
      }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="font-body bg-bg text-text-primary antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
