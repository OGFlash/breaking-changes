name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  frontend-checks:
    name: Frontend (TypeScript + ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm run lint

  admin-checks:
    name: Admin (TypeScript + ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: admin/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm run lint

  backend-checks:
    name: Backend (Ruff + Pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: pytest tests/ -v --tb=short
        env:
          CONTENT_BUCKET: test-content
          MEDIA_BUCKET: test-media
          DYNAMODB_TABLE: test-views
          JWT_SECRET: test-secret-do-not-use
          ADMIN_PASSWORD: testpassword
          AWS_DEFAULT_REGION: us-east-1
